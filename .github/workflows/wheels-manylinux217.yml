name: wheels-manylinux217

# Build fvtk (trimmed VTK 9.6.2) Python wheels tagged
#   manylinux2014_x86_64.manylinux_2_17_x86_64  (glibc 2.17)
# for CPython cp39..cp313 on x86_64 — the SAME platform tag Kitware ships the
# stock `vtk==9.6.2` wheels with.
#
# Recipe (mirrors VTK's own manylinux wheel CI):
#   * build INSIDE quay.io/pypa/manylinux2014_x86_64 (glibc 2.17, devtoolset-10
#     GCC 10.2.1, gold 2.35 — all auto-on-PATH; validated locally)
#   * EGL + OSMesa + X come from the image's el7 system mesa (yum), exactly as
#     the official 9.4+ wheels do (no GL "wheel-SDK" download is involved)
#   * configure with ci/cmake/linux.cmake (== fvtk-config/minimal.cmake: the
#     deny-by-default PyVista closure + LTO/gold-ICF/hash-style levers)
#   * package the generated build tree, then `auditwheel repair --plat
#     manylinux_2_17_x86_64`
#   * smoke-test each wheel offscreen under xvfb in a clean container
#
# Driver: raw docker (GHA `container:`) + cmake + auditwheel — NOT cibuildwheel:
# fvtk is not a PEP-517 `pip install .` project (it configures VTK via an
# init-cache then runs the generated build-tree setup.py), and we want one C++
# build cache shared across the whole Python matrix.

on:
  # Release-gated: a full matrix is 5 CPython legs x ~1h container builds, far
  # too heavy for every push/PR. It runs only on tags (release wheels) and
  # manual dispatch -- the same gating as release-wheel-lto in ci.yml. To smoke a
  # work-in-progress, push a tag or use the Actions "Run workflow" button.
  push:
    tags: ["*"]
  workflow_dispatch:

concurrency:
  group: wheels-m217-${{ github.ref }}
  cancel-in-progress: true

env:
  # The fork renames vtkmodules -> the top-level fvtk package.
  FVTK_IMPORT_NAME: fvtk
  # sccache: tolerate a transient GitHub Actions cache backend outage instead of
  # failing the build (degrade to direct compilation).
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Build — inside manylinux2014 (glibc 2.17). One leg per CPython.
  # ---------------------------------------------------------------------------
  build:
    name: build-cp${{ matrix.python }}
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["39", "310", "311", "312", "313"]
    env:
      PYBIN: /opt/python/cp${{ matrix.python }}-cp${{ matrix.python }}/bin
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Install el7 rendering + build dependencies (system mesa = GL backend)
        run: |
          set -euxo pipefail
          # devtoolset-10 (GCC 10.2.1) + gold 2.35 + LTO plugin are already
          # baked onto PATH by the manylinux2014 image — no `scl enable` needed.
          yum install -y \
            mesa-libGL-devel mesa-libEGL-devel mesa-libOSMesa-devel \
            mesa-libGLU-devel libglvnd-devel \
            libX11-devel libXcursor-devel libXt-devel libXext-devel \
            git
          # cmake + ninja from pip. pip's ninja is >=1.11 (supports VTK's
          # multiple-output wrapping edges); el7's ninja-build is 1.10 and errors
          # "multiple outputs aren't (yet?) supported by depslog".
          # cmake<4.2 (4.1.x is fine; VTK 9.6.2 declares ...4.0 compat). Pin <4
          # instead only if a CMake-4 policy regression appears.
          "$PYBIN/python" -m pip install --upgrade pip
          "$PYBIN/python" -m pip install "cmake>=3.22,<4.2" ninja "setuptools<81" wheel
          # Record toolchain identity in the log (manylinux_2_17 proof).
          gcc --version | head -1
          ld.gold --version | head -1
          ldd --version | head -1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # git inside the container must trust the checkout dir (root-owned).
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Probe sccache (disable if backend unavailable)
        shell: bash
        run: |
          set -uxo pipefail
          if sccache --start-server && sccache --show-stats; then
            echo "SCCACHE_LAUNCHER=sccache" >> "$GITHUB_ENV"
          else
            echo "sccache backend unavailable; building without compiler cache"
            echo "SCCACHE_LAUNCHER=" >> "$GITHUB_ENV"
          fi

      - name: Configure (minimal profile + LTO/gold-ICF levers)
        run: |
          set -euxo pipefail
          export PATH="$PYBIN:$PATH"
          cmake -S . -B build -G Ninja \
            -C ci/cmake/linux.cmake \
            -DCMAKE_C_COMPILER_LAUNCHER="${SCCACHE_LAUNCHER}" \
            -DCMAKE_CXX_COMPILER_LAUNCHER="${SCCACHE_LAUNCHER}" \
            -DPython3_EXECUTABLE="$PYBIN/python" \
            -DPython3_FIND_STRATEGY=LOCATION

      - name: Build
        run: |
          set -euxo pipefail
          export PATH="$PYBIN:$PATH"
          cmake --build build --parallel
          sccache --show-stats || true

      - name: Wheel (bdist_wheel + auditwheel repair -> manylinux_2_17)
        run: |
          set -euxo pipefail
          export PATH="$PYBIN:$PATH"
          python ci/prune_setup_py.py "$PWD/build"
          ( cd build && python setup.py bdist_wheel )
          ls -la build/dist/*.whl
          auditwheel show build/dist/*.whl
          # The render backends are dlopened at runtime, so NEEDED is just
          # baseline system libs -> minimal graft. Stamp the 2_17 tag.
          auditwheel repair --plat manylinux_2_17_x86_64 -w wheelhouse build/dist/*.whl
          ls -la wheelhouse/*.whl
          # Fail loudly if the resulting tag is NOT manylinux_2_17.
          if ! ls wheelhouse/*manylinux_2_17_x86_64*.whl >/dev/null 2>&1; then
            echo "ERROR: repaired wheel is not tagged manylinux_2_17_x86_64" >&2
            exit 1
          fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-manylinux217-cp${{ matrix.python }}-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Smoke test — clean container + el7 runtime mesa + xvfb. Separate job so a
  # render failure is distinguishable from a build failure.
  # ---------------------------------------------------------------------------
  test:
    name: test-cp${{ matrix.python }}
    needs: build
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["39", "310", "311", "312", "313"]
    env:
      PYBIN: /opt/python/cp${{ matrix.python }}-cp${{ matrix.python }}/bin
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime rendering deps + xvfb
        run: |
          set -euxo pipefail
          yum install -y \
            mesa-dri-drivers mesa-libGL mesa-libEGL mesa-libOSMesa libglvnd-egl \
            libX11 libXcursor libXt libXext xorg-x11-server-Xvfb

      - uses: actions/download-artifact@v4
        with:
          name: fvtk-manylinux217-cp${{ matrix.python }}-x86_64
          path: wheelhouse

      - name: Install wheel + offscreen smoke test (xvfb)
        run: |
          set -euxo pipefail
          "$PYBIN/python" -m venv /tmp/venv
          . /tmp/venv/bin/activate
          pip install --upgrade pip
          pip install wheelhouse/*.whl
          # Headless: run under xvfb so the X/GLX render-window path works on a
          # GPU-less runner (llvmpipe software GL).
          xvfb-run -a -s "-screen 0 1280x1024x24" \
            python ci/smoke_test.py
