# Bit-exact regression: assert fvtk compute output is BYTE-FOR-BYTE identical to
# stock VTK 9.6.2 (maxULP=0). Both jobs run on an ORDINARY ubuntu host (so
# actions/checkout + download-artifact's modern Node works) and use the
# manylinux2014 container (glibc 2.17) only via `docker run`. Running these steps
# inside a job-level `container:` is what previously broke CI: checkout's Node 24
# cannot start on glibc 2.17.
#
#   build : cp313 manylinux_2_17 wheel via ci/build-wheels-linux.sh (LTO off)
#   bitexact: stock `pip install vtk==9.6.2` vs the container wheel + the
#             vtkmodules->fvtk shim. Both wheels self-contained -> no LD_LIBRARY_PATH.
name: bit-exact regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bitexact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: build fvtk wheel (manylinux2014, no nix)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: fvtk-ccache-bitexact-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-bitexact-
            fvtk-ccache-m217-

      - name: Build cp313 manylinux_2_17 wheel (LTO off) in container
        run: |
          set -euxo pipefail
          FVTK_LTO=0 \
          CCACHE_DIR="$CCACHE_DIR" \
          OUTDIR="$GITHUB_WORKSPACE/dist-out" \
            ci/build-wheels-linux.sh 313
          ls -la "$GITHUB_WORKSPACE/dist-out"/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-bitexact
          path: dist-out/*.whl
          if-no-files-found: error

  bitexact:
    name: fvtk == stock VTK 9.6.2 (bit-exact)
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: fvtk-wheel-bitexact
          path: dist-out

      - name: Run bit-exact suite (fvtk vs stock VTK 9.6.2) in container
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/bitexact-out"
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/src:ro \
            -v "$GITHUB_WORKSPACE/dist-out":/wheels:ro \
            -v "$GITHUB_WORKSPACE/bitexact-out":/bx-out \
            -e BITEXACT_OUTDIR=/bx-out \
            quay.io/pypa/manylinux2014_x86_64 \
            bash /src/ci/bitexact_in_container.sh /wheels

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-output
          path: bitexact-out
          if-no-files-found: ignore
