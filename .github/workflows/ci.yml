# Nix-free per-PR smoke gate.
#
# Builds the fvtk cp313 manylinux_2_17 wheel and smoke-tests it. The job runs on an
# ORDINARY ubuntu host (so actions/checkout's modern Node works) and drops into the
# manylinux2014 container (glibc 2.17, GCC 10.2.1 + gold, el7 yum mesa) only via
# `docker run` for the build + smoke. Running the build steps inside a job-level
# `container:` is what previously broke CI: checkout's Node 24 cannot start on
# glibc 2.17. The container wheel is auditwheel-self-contained, so no nix / no
# LD_LIBRARY_PATH. LTO off for fast PR feedback (the release wheel + LTO is
# wheels-cibuildwheel.yml, tag-gated). ccache is host-mounted + cached across PRs.
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    tags: ["*"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-smoke:
    name: build + smoke (manylinux2014, no nix)
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: fvtk-ccache-m217-${{ github.sha }}
          restore-keys: fvtk-ccache-m217-

      - name: Build cp313 manylinux_2_17 wheel (LTO off) in container
        run: |
          set -euxo pipefail
          FVTK_LTO=0 \
          CCACHE_DIR="$CCACHE_DIR" \
          OUTDIR="$GITHUB_WORKSPACE/wheelhouse" \
            ci/build-wheels-linux.sh 313
          ls -la "$GITHUB_WORKSPACE/wheelhouse"/*.whl

      - name: Smoke — import + compute + WebCore + offscreen render in container
        run: |
          set -euxo pipefail
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/src:ro \
            quay.io/pypa/manylinux2014_x86_64 \
            bash /src/ci/smoke_in_container.sh /src/wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-cp313-manylinux217
          path: wheelhouse/*.whl
          if-no-files-found: error
