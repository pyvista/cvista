# CI gate — runs on every PR to main AND on every push to main. The Linux build
# leg + the two Linux-only numeric gates run on PRs; the all-OS leg runs on main
# only (see build-other-os `if:` below). Jobs:
#
#   build (linux)   : cibuildwheel builds the SINGLE cp312-abi3 wheel in the
#              manylinux_2_28 (glibc 2.28, AlmaLinux 8, GCC 14.2.1) container and
#              runs the in-container offscreen smoke (pyproject [tool.cibuildwheel]
#              test-command). Python 3.11 has been dropped (maintainer directive):
#              the wheel is a single Py_LIMITED_API 0x030c0000 abi3 wheel tagged
#              cp312-abi3 that loads on CPython 3.12+. cibuildwheel's abi3 dedup
#              means the cp312-* cp313-* cp314-* selectors yield exactly ONE build
#              and ONE wheel. cibuildwheel handles host-checkout -> build in the
#              container -> auditwheel repair (--plat manylinux_2_28_x86_64), so we
#              don't hand-roll any docker. Uploads fvtk-wheels-linux-cp312abi3.
#              GCC 14 activates the GCC>=12-gated unity + array-split build-time
#              levers that are inert on the old manylinux2014/GCC-10.2.1 image.
#   build (macos/windows) : the build-other-os matrix — one job per OS (macos-14,
#              windows-latest), each running the cp312+ abi3 build through
#              cibuildwheel on a native runner and the in-cibuildwheel smoke. GATED
#              to non-PR events (`if: github.event_name != 'pull_request'`): macOS /
#              Windows build on PUSH-TO-MAIN and workflow_dispatch only, so PRs stay
#              Linux-only (fast/cheap). Per-OS ccache (keyed fvtk-cibw-ccache-<os>)
#              shares the python-independent C++ across runs. Each OS uploads
#              fvtk-wheels-<os> (a DISJOINT artifact prefix from the Linux gate).
#   bitexact : install the cp312-abi3 LINUX wheel on the host (per-python via
#              setup-python) alongside stock vtk==9.6.2 and assert byte-for-byte
#              identical output (maxULP=0). No container — only the build needs old
#              glibc; the wheel runs anywhere >= glibc 2.28. ABI3-AWARE parity
#              (BITEXACT_ABI3=1): only type __flags__ HEAPTYPE/IMMUTABLETYPE
#              diverges; numpy zero-copy preserved. Matrixed over py3.12 + py3.13
#              (both install the one abi3 wheel). stock vtk==9.6.2 only ships Linux
#              wheels, so this gate is Linux-only.
#   renderexact : same idea for the RENDERING pipeline (tests/renderexact). Renders
#              the scenes offscreen via vtkEGLRenderWindow under stock vtk and fvtk
#              through the SAME host Mesa software GL (llvmpipe) and asserts
#              pixel-for-pixel identical RGBA + Z framebuffers. A sibling of bitexact
#              (reuses the Linux build artifact). Run on py3.13 (the abi3 wheel);
#              render output is wheel-format-independent. Linux-only (same stock-vtk
#              reason).
name: CI

on:
  # Runs on merges to main too, so each main build refreshes the per-leg ccache
  # seed that PR builds restore (the "cold≈warm" lever). PR builds restore the
  # most recent seed via restore-keys; this push build saves a new one.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build cp312-abi3 (manylinux_2_28)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # VTK derives its version from full history

      # --- ccache cross-RUN SEED (the cold≈warm lever) ------------------------
      # The single Linux abi3 leg keeps ONE container alive for the whole cp
      # matrix, so the in-container /ccache (pyproject linux env) already shares
      # the python-independent C++ across the abi3 dedup WITHIN a run. THIS step
      # adds cross-RUN persistence: restore a per-leg ccache seeded by the most
      # recent push-to-main build (`restore-keys` prefix match). The C++ kit
      # objects are python-independent and byte-stable across commits that don't
      # touch them, so a PR's "cold" build restores the seed and recompiles only
      # its changed TUs (+ the non-cacheable codegen/link floor). `key` is unique
      # per run (github.run_id) so every run SAVES a fresh seed at job end; on
      # push-to-main that becomes the new seed PRs restore. Branch scoping: a PR
      # can read caches from its base branch (main) and its own branch, so the
      # seed naturally comes from main.
      - name: Make ccache dir world-writable (container build user differs)
        run: mkdir -p /tmp/fvtk-cibw-ccache && chmod 0777 /tmp/fvtk-cibw-ccache
      - name: Restore ccache seed (cross-run)
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache
          key: fvtk-ccache-linux-cp312abi3-${{ github.run_id }}
          restore-keys: |
            fvtk-ccache-linux-cp312abi3-

      - name: Build wheel + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          # Single abi3 wheel: cp312-* cp313-* cp314-* all dedup to ONE cp312-abi3
          # build (pyproject `build` selector already restricts to cp312+).
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # PR/push builds are LTO-OFF + -O2 for a fast/cheap BIT-EXACT gate:
          #   FVTK_LTO=0      drops -flto (changes inlining, not FP values).
          #   FVTK_GATE_O2=1  drops the per-TU optimizer from -O3 to -O2 (faster
          #                   codegen; bit-exact — no -ffast-math, so IEEE FP is
          #                   identical at -O2 and -O3). Release builds
          #                   (wheels-cibuildwheel.yml) leave both unset -> -O3 +
          #                   LTO, so shipped wheels stay fully optimized.
          #   FVTK_SOURCE_UNITY=1  per-module source UNITY_BUILD (byte-identical
          #                   objects; GCC>=12-gated, active on this 2_28 image),
          #                   together with the GCC<12-gated wrapper-unity
          #                   (FVTK_WRAP_UNITY, default ON) and the array-TU split.
          CIBW_ENVIRONMENT: FVTK_LTO=0 FVTK_GATE_O2=1 FVTK_SOURCE_UNITY=1
          # Mount the restored host ccache dir into the build container so ccache
          # actually reads/writes the persisted seed (CCACHE_DIR=/ccache is set in
          # pyproject [tool.cibuildwheel.linux.environment]). Without this mount
          # the in-container /ccache is discarded at container exit and the seed is
          # never consulted.
          CIBW_CONTAINER_ENGINE: "docker; create_args: -v /tmp/fvtk-cibw-ccache:/ccache"
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-linux-cp312abi3
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-other-os:
    name: build ${{ matrix.os }}
    # macOS/Windows on main + workflow_dispatch only; PRs stay Linux-only (fast).
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # One job per non-Linux OS. Each runs the cp312+ abi3 build through
      # cibuildwheel; the backend emits the single cp312-abi3 wheel per OS. All
      # config (archs, init-cache, repair tool, per-OS test-command smoke) lives in
      # pyproject.toml [tool.cibuildwheel.macos|windows]. These legs prove the wheel
      # BUILDS + imports on its native platform; the numeric/pixel gates stay
      # Linux-only (stock vtk==9.6.2 is Linux-only).
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Per-OS cross-run ccache (Linux/macOS). The constant build dir + CCACHE_BASEDIR
      # fix make the python-independent C++ a cache hit across runs.
      - name: Restore ccache (cross-run)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: /tmp/fvtk-cibw-ccache
          key: fvtk-cibw-ccache-${{ matrix.os }}-${{ github.sha }}
          restore-keys: fvtk-cibw-ccache-${{ matrix.os }}-
      # Put MSVC (cl.exe) + the Windows SDK on PATH for the whole job. The Ninja
      # generator does NOT auto-run vcvars, so without this cmake auto-selects the
      # mingw GCC that ships on the windows runner (C:\mingw64\bin\cc.exe) — or
      # finds no cl at all — and fails ("CMAKE_C_COMPILER: cl is not a full path").
      # ci/cmake/windows.cmake pins CMAKE_CXX_COMPILER=cl, so cl must be on PATH.
      - name: Set up MSVC (vcvars) for the Ninja build
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build wheel + smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        # No env here: per-OS config (archs, FVTK_CMAKE_INIT, ccache launcher,
        # test-command) is all in pyproject [tool.cibuildwheel.<os>]. The shipped
        # macOS/Windows wheels stay fully optimized (no FVTK_LTO=0 override).
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  bitexact:
    name: fvtk == stock VTK 9.6.2 (bit-exact, py${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Both pythons install the one cp312-abi3 wheel -> abi3-aware parity
        # (only type __flags__ diverges; numpy zero-copy preserved).
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          # ONLY the Linux build leg (fvtk-wheels-linux-*); pip --find-links picks
          # the cp312-abi3 wheel (tag-compatible on 3.12 and 3.13). The
          # macOS/Windows artifacts (fvtk-wheels-macos-14 / -windows-latest) are a
          # DISJOINT prefix, so they never reach this Linux gate.
          pattern: fvtk-wheels-linux-*
          merge-multiple: true
          path: dist
      - name: Bit-exact suite (fvtk vs stock VTK 9.6.2)
        # The single abi3 wheel is always tested ABI3-AWARE (BITEXACT_ABI3=1):
        # the heap-type wrappers differ from stock only in type __flags__
        # (HEAPTYPE/IMMUTABLETYPE); every numeric value stays maxULP=0.
        env:
          BITEXACT_ABI3: "1"
        run: ci/run-bitexact.sh dist python
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-output-py${{ matrix.python }}
          path: /tmp/bx-out
          if-no-files-found: ignore

  renderexact:
    name: fvtk == stock VTK 9.6.2 (pixel-exact render, py${{ matrix.python }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The cp312-abi3 wheel on 3.13. Render output is wheel-format-independent
        # (the GL command stream is identical), so a single python is sufficient.
        python: ["3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Mesa software GL/EGL (llvmpipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-dri libglx-mesa0 libgles2 libosmesa6 libxcb1
      - uses: actions/download-artifact@v4
        with:
          pattern: fvtk-wheels-linux-*
          merge-multiple: true
          path: dist
      - name: Pixel-exact render suite (fvtk vs stock VTK 9.6.2, software EGL)
        run: ci/run-renderexact.sh dist python
      - name: Upload render diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: renderexact-output-py${{ matrix.python }}
          path: /tmp/rx-out
          if-no-files-found: ignore
