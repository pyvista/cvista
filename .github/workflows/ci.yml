# Per-PR gate. Two jobs, both on a plain ubuntu host (no job-level `container:`):
#
#   build    : cibuildwheel builds the cp313 manylinux_2_17 wheel and runs the
#              in-container offscreen smoke (pyproject [tool.cibuildwheel]
#              test-command). cibuildwheel handles host-checkout -> build in the
#              manylinux2014 (glibc 2.17) container -> auditwheel repair, so we
#              don't hand-roll any docker.
#   bitexact : install that self-contained wheel on the host (cp313 via
#              setup-python) alongside stock vtk==9.6.2 and assert byte-for-byte
#              identical output (maxULP=0). No container — only the build needs
#              old glibc; the wheel runs anywhere.
name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build cp313 wheel (manylinux_2_17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # VTK derives its version from full history
      - name: Build wheel + offscreen smoke (cibuildwheel)
        uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: cp313-*   # fast PR gate; release matrix is wheels-cibuildwheel.yml
          # PR builds are LTO-OFF for fast/cheap CI (FVTK_LTO=0 drops -flto in
          # fvtk-config/minimal.cmake). cibuildwheel forwards CIBW_ENVIRONMENT
          # into the per-leg build env. Releases (wheels-cibuildwheel.yml) leave
          # FVTK_LTO unset -> default ON, so shipped wheels stay LTO-optimized.
          CIBW_ENVIRONMENT: FVTK_LTO=0
      - uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-cp313
          path: wheelhouse/*.whl
          if-no-files-found: error

  bitexact:
    name: fvtk == stock VTK 9.6.2 (bit-exact)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: fvtk-wheel-cp313
          path: dist
      - name: Bit-exact suite (fvtk vs stock VTK 9.6.2)
        run: ci/run-bitexact.sh dist python
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bitexact-output
          path: /tmp/bx-out
          if-no-files-found: ignore
