name: CI

# Build the minimal PyVista-parity fvtk wheel (FVTK_ICF on) on the default
# GitHub-hosted Ubuntu runner and smoke-test it. The build uses the same
# shell.nix toolchain as local dev, so the only host requirement is nix.
on:
  # PRs only (not branch pushes): a push to a PR branch otherwise fires TWO runs
  # -- the push- and pull_request-triggered pair land in different concurrency
  # groups (refs/heads/... vs refs/pull/N/merge) and so never cancel each other.
  # Tags still trigger release-wheel-lto; workflow_dispatch stays for manual.
  pull_request:
    branches: [main]
  workflow_dispatch:
  push:
    tags: ["*"]

concurrency:
  # head_ref for PRs (source branch), ref otherwise; cancel superseded runs.
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: build + smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # VTK records upstream provenance in the root commit; keep full history
          # so version/provenance derivation in setup.py behaves.
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          # shell.nix uses <nixpkgs>; pin it to a channel that ships python313.
          nix_path: nixpkgs=channel:nixos-25.05

      # Warm ccache across runs so only the first build pays the full cost.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/fvtk-ccache
          key: fvtk-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-${{ runner.os }}-

      - name: Build minimal wheel (smoke gate — LTO off for fast feedback)
        env:
          # Cap ccache well under GitHub's 10 GB Actions-cache limit. The default
          # (build-fvtk.sh: CCACHE_MAXSIZE=30G) let the cache grow to ~30 GB,
          # which actions/cache cannot upload — the post-job "save cache" step
          # then stalled 25+ min (effectively hanging the run) before failing.
          # A 4 GB ccache fully covers this single LTO-off build and saves fast.
          CCACHE_MAXSIZE: 4G
        run: |
          # Per-push/PR gate: validate the build + smoke quickly. LTO is a
          # release lever (see release-wheel-lto job), too slow for every push.
          FVTK_LTO=0 FVTK_STRIP=1 BUILD_JOBS="$(nproc)" ./build-fvtk.sh
          WHEEL="$(ls "$PWD"/build-fvtk/dist/*.whl)"
          echo "WHEEL=$WHEEL" >> "$GITHUB_ENV"
          ls -la "$WHEEL"

      # Hard gate: the wheel imports and the compute path works on a clean box.
      - name: Smoke — import + compute
        run: |
          cat > /tmp/smoke_min.py <<'PY'
          import numpy as np, fvtk
          from fvtk.vtkCommonCore import vtkVersion
          print("VTK", vtkVersion.GetVTKVersion())
          from fvtk.util.numpy_support import numpy_to_vtk, vtk_to_numpy
          a = np.arange(30, dtype=np.float64).reshape(10, 3)
          assert np.allclose(a, vtk_to_numpy(numpy_to_vtk(a))), "numpy roundtrip"
          from fvtk.vtkFiltersSources import vtkSphereSource
          from fvtk.vtkFiltersCore import vtkTriangleFilter
          s = vtkSphereSource(); s.SetThetaResolution(16); s.SetPhiResolution(16)
          t = vtkTriangleFilter(); t.SetInputConnection(s.GetOutputPort()); t.Update()
          assert t.GetOutput().GetNumberOfCells() > 0, "empty pipeline"
          print("import + compute OK; cells", t.GetOutput().GetNumberOfCells())
          PY
          nix-shell shell.nix --run '
            # Put nix input libs (mesa, zlib, ...) + gcc libstdc++ on the loader
            # path so the wheel + numpy import. Derived, not machine-specific.
            #
            # NOTE: $buildInputs lists the *-dev* outputs (e.g. zlib-1.3.1-dev),
            # which carry headers + the linker .so symlink but NOT the runtime
            # soname (libz.so.1 lives in the separate "out" output). Expanding each
            # buildInput via `nix-store --references` pulls in those out outputs so
            # runtime sonames (libz.so.1, mesa, X11) actually resolve at import.
            LL="$(g++ -print-file-name=libstdc++.so.6)"; LL="$(dirname "$LL")"
            for p in $buildInputs; do
              LL="$p/lib:$LL"
              for r in $(nix-store -q --references "$p" 2>/dev/null); do LL="$r/lib:$LL"; done
            done
            export LD_LIBRARY_PATH="$LL:$LD_LIBRARY_PATH"
            python3.13 -m venv /tmp/sv
            /tmp/sv/bin/python -m pip -q install --upgrade pip numpy
            /tmp/sv/bin/python -m pip -q install "$WHEEL"
            /tmp/sv/bin/python /tmp/smoke_min.py
          '

      # NOTE: a headless EGL offscreen-render smoke (mesa llvmpipe + surfaceless)
      # used to run here, but on GitHub-hosted runners it reliably HANGS in a GL
      # driver call that swallows SIGTERM — neither `timeout` (signal is ignored)
      # nor the step `timeout-minutes` bounded it promptly, so the job sat in a
      # ~10+ min zombie tail every run for zero signal (the step was already
      # best-effort / continue-on-error and "validated locally"). It is dropped
      # from CI on purpose; offscreen render is validated on a real GPU/dev box.
      # The import+compute smoke above is the actual gate.

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-ubuntu-latest
          path: build-fvtk/dist/*.whl
          if-no-files-found: error

  # LTO release wheel: full -O3 + -flto=auto + -fno-semantic-interposition + ICF
  # + strip. ~+2% runtime and ~-3% size vs untuned -O3, ~3x build time, so it
  # runs only on tags / manual dispatch, not every push. PGO is intentionally
  # OFF for the shipped wheel (see ci/pgo-build.sh — kept for opt-in re-enable):
  # PGO's +26%/-25% is concentrated on a curated filter-training workload and
  # ships cold code at -Os, which we don't want as the default release.
  release-wheel-lto:
    name: LTO release wheel (ubuntu-latest)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/fvtk-ccache
          key: fvtk-ccache-lto-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            fvtk-ccache-lto-${{ runner.os }}-

      - name: LTO build (no PGO)
        env:
          # Cap ccache under GitHub's 10 GB Actions-cache limit so the post-job
          # cache save doesn't stall (see build-wheel job). 8 GB covers the LTO
          # build's larger object set.
          CCACHE_MAXSIZE: 8G
        run: |
          FVTK_LTO=1 FVTK_ICF=1 FVTK_STRIP=1 BUILD="$PWD/build-fvtk-lto" \
            BUILD_JOBS="$(nproc)" ./build-fvtk.sh
          WHEEL="$(ls "$PWD"/build-fvtk-lto/dist/*.whl)"
          echo "WHEEL=$WHEEL" >> "$GITHUB_ENV"
          ls -la "$WHEEL"

      - name: Smoke — import + compute (LTO wheel)
        run: |
          cat > /tmp/smoke_lto.py <<'PY'
          import numpy as np, fvtk
          from fvtk.vtkCommonCore import vtkVersion
          print("VTK", vtkVersion.GetVTKVersion())
          from fvtk.util.numpy_support import numpy_to_vtk, vtk_to_numpy
          a = np.arange(30, dtype=np.float64).reshape(10, 3)
          assert np.allclose(a, vtk_to_numpy(numpy_to_vtk(a))), "numpy roundtrip"
          from fvtk.vtkFiltersCore import vtkContourFilter  # noqa: F401
          # vtkImageData is a CommonDataModel data object; vtkImagingCore holds
          # imaging *filters* (e.g. vtkImageDifference). Import each from its real
          # module and exercise the imaging data path so the smoke has signal.
          from fvtk.vtkCommonDataModel import vtkImageData
          from fvtk.vtkImagingCore import vtkImageDifference  # noqa: F401
          img = vtkImageData(); img.SetDimensions(4, 4, 2)
          assert img.GetNumberOfPoints() == 32, "vtkImageData dims"
          print("LTO wheel import + compute OK")
          PY
          nix-shell shell.nix --run '
            # See build-wheel smoke: $buildInputs are *-dev outputs; expand via
            # nix-store --references so runtime sonames (libz.so.1, ...) resolve.
            LL="$(g++ -print-file-name=libstdc++.so.6)"; LL="$(dirname "$LL")"
            for p in $buildInputs; do
              LL="$p/lib:$LL"
              for r in $(nix-store -q --references "$p" 2>/dev/null); do LL="$r/lib:$LL"; done
            done
            export LD_LIBRARY_PATH="$LL:$LD_LIBRARY_PATH"
            python3.13 -m venv /tmp/sv-lto
            /tmp/sv-lto/bin/python -m pip -q install --upgrade pip numpy
            /tmp/sv-lto/bin/python -m pip -q install "$WHEEL"
            /tmp/sv-lto/bin/python /tmp/smoke_lto.py
          '

      - name: Upload LTO wheel
        uses: actions/upload-artifact@v4
        with:
          name: fvtk-wheel-lto-ubuntu-latest
          path: build-fvtk-lto/dist/*.whl
          if-no-files-found: error
